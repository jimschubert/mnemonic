# Build the vec1 SQLite extension for each supported platform and attach the
# binaries to the GitHub release as standalone downloadable assets. Triggered
# manually so that it can run after GoReleaser has published a release (the
# default GITHUB_TOKEN cannot trigger other workflows from release events).
# Leave `version` blank to target the latest published release automatically.
# Users need the extension only to inspect a mnemonic vec1 index with the
# standalone sqlite3 shell — normal operation doesn't require it.

name: Build vec1 extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to build for (leave empty to use the latest release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  resolve-tag:
    name: resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    permissions:
      contents: read
    steps:
      - name: resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.version }}"
          if [ -z "$TAG" ]; then
            TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName -q '.[0].tagName')"
          fi
          if [ -z "$TAG" ]; then echo "::error::Could not resolve a release tag"; exit 1; fi
          echo "Resolved release tag: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: resolve-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: so
            cc: gcc
            link_flags: -shared -fPIC
            multi: true

          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: so
            cc: gcc
            link_flags: -shared -fPIC
            # GCC on aarch64 is stricter than clang about signed/unsigned type
            # conversions in NEON intrinsics within vec1.c.
            extra_cflags: -flax-vector-conversions
            multi: false

          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: dylib
            cc: clang
            link_flags: -dynamiclib -undefined dynamic_lookup
            # LLVM clang on the CI runner hard-errors on __builtin_cpu_init and
            # __builtin_cpu_supports (x86-only GCC builtins used in vec1HasAvx2);
            # Xcode clang silently stubs them, so this won't happen locally.
            # Stub them out so they compile cleanly; the scalar path never calls
            # vec1HasAvx2() at runtime anyway.
            extra_cflags: "-D__builtin_cpu_init()= -D__builtin_cpu_supports(x)=0"
            multi: false

          - os: macos-26-intel
            goos: darwin
            goarch: amd64
            ext: dylib
            cc: clang
            link_flags: -dynamiclib -undefined dynamic_lookup
            multi: true

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: find pinned vec1.c source URL
        id: vec1-url
        run: |
          go mod download
          # this logic should mirror script/build-vec1-dylib.sh from the repo root.
          MOD_DIR="$(go list -m -f '{{.Dir}}' github.com/ncruces/go-sqlite3-wasm/v2)"
          BUILD_SH="${MOD_DIR}/vec1/build/build.sh"
          RAW_URL="$(grep 'sqlite.org/vec1/raw/' "$BUILD_SH" | sed -E 's/.*"(https:\/\/sqlite\.org\/vec1\/raw\/[^"]+)".*/\1/')"
          if [ -z "$RAW_URL" ]; then echo "::error::Could not extract vec1.c URL from ${BUILD_SH}"; exit 1; fi
          echo "url=${RAW_URL}" >> "$GITHUB_OUTPUT"

      - name: download vec1.c
        run: curl -fsSL "${{ steps.vec1-url.outputs.url }}" -o vec1.c

      # multi-arch (amd64 only), as described in https://sqlite.org/vec1/file?name=Makefile&ci=tip
      - name: build (multi-arch x86_64)
        if: ${{ matrix.multi }}
        env:
          CC: ${{ matrix.cc }}
          LINK_FLAGS: ${{ matrix.link_flags }}
          TARGET: vec1-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.ext }}
        run: |
          "$CC" -DVEC1SIMD=SCALAR -c -O3 -DNDEBUG -Wextra -fPIC vec1.c -o vec1scalar.o
          "$CC" -DVEC1SIMD=AVX2   -c -O3 -DNDEBUG -Wextra -fPIC -mavx2 -mfma vec1.c -o vec1avx2.o
          # shellcheck disable=SC2086
          "$CC" vec1scalar.o vec1avx2.o $LINK_FLAGS -o "$TARGET"

      - name: build (scalar only)
        if: ${{ !matrix.multi }}
        env:
          CC: ${{ matrix.cc }}
          LINK_FLAGS: ${{ matrix.link_flags }}
          EXTRA_CFLAGS: ${{ matrix.extra_cflags }}
          TARGET: vec1-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.ext }}
        run: |
          # shellcheck disable=SC2086
          "$CC" -DVEC1SIMD=SCALAR -O3 -DNDEBUG -Wextra -fPIC $EXTRA_CFLAGS $LINK_FLAGS vec1.c -o "$TARGET"

      - uses: actions/upload-artifact@v7
        with:
          name: vec1-${{ matrix.goos }}-${{ matrix.goarch }}
          path: vec1-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.ext }}
          if-no-files-found: error

  upload:
    name: attach to release
    needs: [resolve-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: vec1-*
          merge-multiple: true
          path: dist/vec1

      - name: upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: gh release upload "$TAG" dist/vec1/* --clobber --repo "$GITHUB_REPOSITORY"


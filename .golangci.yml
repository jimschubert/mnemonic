version: "2"

linters:
  settings:
    errcheck:
      # List of functions to exclude from checking, where each entry is a single function to exclude.
      # See https://github.com/kisielk/errcheck#excluding-functions for details.
      exclude-functions:
        - fmt.Fprintf
        - (*text/tabwriter.Writer).Flush
        - (io.ReadCloser).Close
        - (io.Closer).Close
        - (*os.File).Close
        - (*os.File).WriteString
        - (*github.com/jimschubert/mnemonic/internal/controller.MemoryController).Close
        - (*github.com/jimschubert/mnemonic/internal/compact.Compacter).Close
        - (*github.com/modelcontextprotocol/go-sdk/mcp.ClientSession).Close

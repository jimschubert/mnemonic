  # Security head (mandatory)
  - id: sensitive-data-redaction
    content: "SECURITY: Never log AWS Access Keys, API Keys, or any other sensitive PII. Use a redaction
      function to scrub these values before logging. Consider using a regex-based
      redactor that replaces all but the last 4 characters with asterisks."
    tags: [ security, pii, logging, redaction ]
    category: security
    scope: global
    score: 1.0
    hit_count: 23

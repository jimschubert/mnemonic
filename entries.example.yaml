  - id: go-error-wrapping
    content: "GO STYLE: Wrap errors with context using fmt.Errorf(\"doing X: %w\",err). 
      Never discard errors silently with _. Always check returns from functions that can fail."
    tags: [ go, errors, style, fmt ]
